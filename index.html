<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>URL Shortener</h2>
    <input type="text" id="longUrl" placeholder="Enter long URL here...">
    <button onclick="shorten()">Shorten</button>
    <div id="result"></div>
</div>

<script>
    async function shorten() {
        const url = document.getElementById('longUrl').value;
        const resultDiv = document.getElementById('result');

        const response = await fetch('/api/post-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ long_url: url })
        });

        const data = await response.json();
        
        if (data["short url"]) {
            const baseUrl = "http://127.0.0.1:8000/";
            const shortCode = data['short url']; 

            resultDiv.innerHTML = `Short URL: <a href="${baseUrl}${shortCode}" target="_blank">${baseUrl}${shortCode}</a>`;
        } else {
            resultDiv.innerHTML = `Error: ${data.message}`;
        }
    }
</script>

</body>
</html>
